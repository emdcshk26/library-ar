<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Library AR</title>

    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin:0; overflow:hidden;">
    <a-scene embedded arjs>

      <!-- George -->
      <a-marker
        type="pattern"
        url="georgeshark2.patt"
        smooth="true"
        smoothCount="10"
        smoothTolerance="0.01"
        smoothThreshold="5">
        <a-entity
          gltf-model="george.glb"
          scale="0.005 0.005 0.005"
          position="0 -0.7 0">
        </a-entity>
      </a-marker>

      <!-- Perseverance -->
      <a-marker
        type="pattern"
        url="perseveranceshark4.patt"
        smooth="true"
        smoothCount="10"
        smoothTolerance="0.01"
        smoothThreshold="5">
        <a-entity
          gltf-model="perseverance.glb"
          scale="0.5 0.5 0.5"
          position="0 -0.5 0">
        </a-entity>
      </a-marker>

      <!-- Telescope -->
      <a-marker
        type="pattern"
        url="telescopeshark5.patt"
        smooth="true"
        smoothCount="10"
        smoothTolerance="0.01"
        smoothThreshold="5">
        <a-entity
          gltf-model="telescope.glb"
          scale="0.5 0.5 0.5"
          position="0 -0.5 0">
        </a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
