<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Library AR</title>

    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin:0; overflow:hidden;">
    <a-scene embedded arjs>

      <!-- George -->
      <a-marker
        type="pattern"
        url="georgeshark2.patt"
        smooth="true"
        smoothCount="10"
        smoothTolerance="0.01"
        smoothThreshold="5">
        <a-entity
          gltf-model="george.glb"
          scale="0.004 0.004 0.004"
          position="0 -1 0">
        </a-entity>
      </a-marker>

      <!-- Perseverance -->
      <a-marker
        type="pattern"
        url="pattern-rover.patt"
        smooth="true"
        smoothCount="10"
        smoothTolerance="0.01"
        smoothThreshold="5">
        <a-entity
          gltf-model="perseverance.glb"
          scale="2 2 2"
          position="0 -0.5 0">
        </a-entity>
      </a-marker>

      <!-- Telescope -->
      <a-marker
        type="pattern"
        url="pattern-telescope (2).patt"
        smooth="true"
        smoothCount="10"
        smoothTolerance="0.01"
        smoothThreshold="5">
        <a-entity
          gltf-model="telescope.glb"
          scale="0.15 0.15 0.15"
          position="0 -4 0">
        </a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
